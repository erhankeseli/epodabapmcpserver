# ─── ProGuard Configuration for EPOD ADT MCP Server Plugin ───────────────────
# Obfuscates internal implementation while preserving OSGi/Eclipse entry points.

# ─── General settings ────────────────────────────────────────────────────────
-dontoptimize
-dontshrink
-repackageclasses 'com.epod.adt.mcp.internal'
-allowaccessmodification
-keepattributes Exceptions,InnerClasses,Signature,*Annotation*,SourceFile,LineNumberTable

# ─── Suppress warnings for runtime-provided libraries ────────────────────────
-dontwarn org.eclipse.**
-dontwarn com.sap.**
-dontwarn com.google.gson.**
-dontwarn com.sun.net.httpserver.**
-dontwarn javax.**
-dontnote **
-ignorewarnings

# ─── OSGi / Eclipse entry points (referenced in MANIFEST.MF & plugin.xml) ───
-keep class com.epod.adt.mcp.Activator {
    public protected *;
}

-keep class com.epod.adt.mcp.ui.McpServerView {
    public protected *;
}

-keep class com.epod.adt.mcp.preferences.PreferenceInitializer {
    public protected *;
}

-keep class com.epod.adt.mcp.preferences.McpPreferencePage {
    public protected *;
}

# ─── Exported API (MANIFEST.MF Export-Package) ───────────────────────────────
-keep class com.epod.adt.mcp.server.McpServer {
    public protected *;
}

-keep class com.epod.adt.mcp.server.McpServer$IServerStatusListener {
    public protected *;
}

-keep interface com.epod.adt.mcp.tools.McpTool {
    public protected *;
}

# ─── Keep Gson serialization working ─────────────────────────────────────────
-keepclassmembers class * {
    @com.google.gson.annotations.SerializedName <fields>;
}
